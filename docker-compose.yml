name: chat-gpt-clone

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat-gpt-clone-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      CLIENT_URL: http://localhost:8080
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/secrets/firebaseServiceAccountKey.json
    ports:
      - "3000:3000"
    volumes:
      - ./backend/secrets:/app/secrets:ro
    restart: unless-stopped

  backend-image:
    build:
      context: ./backend-image
      dockerfile: Dockerfile
    container_name: chat-gpt-clone-backend-image
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_NEST_API_URL: /api
    container_name: chat-gpt-clone-frontend
    depends_on:
      - backend
      - backend-image
    ports:
      - "8080:80"
    restart: unless-stopped
